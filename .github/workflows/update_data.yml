name: Update Dashboard Data

on:
  schedule:
    - cron: '0 11 * * *'   # 6am Colombia
    - cron: '0 15 * * *'   # 10am Colombia
    - cron: '0 19 * * *'   # 2pm Colombia
    - cron: '0 23 * * *'   # 6pm Colombia
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Redash data
        env:
          REDASH_API_KEY: ${{ secrets.REDASH_API_KEY }}
          
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Update dashboard data"
          git push origin main || true
          git stash pop || true
          git add data.json
          git diff --cached --quiet || git commit -m "Update dashboard data"
          git push origin main || true
